[workflow]
name = "chronicle-analyzer"
description = "Analyze session summaries and group into journeys for chronicle generation"
type = "agent"

[trigger]
schedule = "hourly"

[agent]
model = "medium"
thinking = "off"
prompt = "Analyze only today's markdown session summaries and today's top-level plan markdown files. Do not inspect raw .jsonl session logs. Write valid JSON to today's chronicle analysis output path."

[retry]
max_attempts = 2

[validators]
input = "validate-input.ts"
output = "validate-output.ts"

[timeout]
minutes = 10

# Bosun Configuration
# Copy to config.toml and customize: cp config.sample.toml config.toml

# =============================================================================
# Model Configuration
# =============================================================================
# Model tiers — referenced by tier name in agent frontmatter (e.g., model: lite)
# Use any model string your provider supports. Examples:
#   OpenAI:    gpt-5.4-mini, gpt-5.3-codex, gpt-5.4, o3
#   Anthropic: claude-haiku-4-5, claude-sonnet-4-6, claude-opus-4-6

[models]
lite = "gpt-5.4-mini"                    # Fast, cheap — context gathering, summaries
medium = "gpt-5.3-codex"                 # Balanced — coding tasks, IDE-grade speed
high = "gpt-5.4"                         # Best — complex planning, orchestration
oracle = "gpt-5.4"                       # Deep reasoning — architecture, hard debugging

# =============================================================================
# Workspace
# =============================================================================

[workspace]
path = "workspace"                        # Relative to BOSUN_ROOT

# =============================================================================
# Agent Configuration
# =============================================================================

[agents]
default_agent = "bosun"
# extra_paths = ["./my-custom-agents"]  # additional agent discovery paths

# =============================================================================
# Spawn Backend
# =============================================================================

[backend]
type = "tmux"
# socket is auto-detected from $TMUX env or computed by scripts/tmux-socket.sh
command_prefix = "scripts/sandbox.sh"

# =============================================================================
# Environment Variables (passed into bwrap sandbox)
# =============================================================================

[env]
allowed = [
  "ANTHROPIC_API_KEY",
  "OPENAI_API_KEY",
  "GEMINI_API_KEY",
  "PERPLEXITY_API_KEY",
  "OPENROUTER_API_KEY",
  "USER",
  "LOGNAME",
  "TERM",
  "COLORTERM",
  "LANG",
  "TZ",
]

# Secret values — written to secrets.env (gitignored) by `just init`.
# Use this for API keys so they stay in config.toml (also gitignored) and
# never end up in tracked files or shell history.
# [env.values]
# ZAI_API_KEY = "your-key-here"
# OPENAI_API_KEY = "sk-..."

# =============================================================================
# Sandbox Paths (process-level, bwrap)
# =============================================================================
# NOTE: Changes here require `just stop && just start` to take effect.
# The bwrap mount namespace is frozen when the tmux server starts.
# Running `just init` regenerates bwrap.json, but the running sandbox
# won't see new mounts until restart.

[paths]
# Additional read-only bind mounts beyond defaults
ro_bind = []
# Additional read-write bind mounts beyond defaults
rw_bind = []

# =============================================================================
# Tool-level Sandbox (pi-sandbox)
# =============================================================================

[sandbox]
enabled = true
gpu_passthrough = true                    # Bind /dev/dri render nodes for GPU compute (Vulkan/OpenCL)
                                          # Enables hardware-accelerated embeddings in memory-embed workflow
                                          # Disable if you don't want agents accessing GPU devices
# docker_passthrough = false              # Bind Docker socket into sandbox (opt-in)
                                          # ⚠ Docker socket access ≈ root on the host
                                          # Enable if agents need to build/run containers

[sandbox.filesystem]
deny_read = ["~/.ssh", "~/.aws", "~/.gnupg"]
allow_write = [".", "/tmp"]
deny_write = [".env", ".env.*", "*.pem", "*.key"]

# =============================================================================
# Daemon Configuration
# =============================================================================

[daemon]
enabled = true
heartbeat_interval_seconds = 30
log_level = "info"
# Workflows are auto-discovered from packages/*/workflows/, .pi/workflows/,
# and workspace/workflows/. No manual rules or watchers needed.

# =============================================================================
# Mesh Coordination (pi-mesh)
# =============================================================================

[mesh]
auto_register = true
context_mode = "full"
feed_retention = 50
auto_status = true

[mesh.identity_sync]
enabled = true
startup_align = true
mesh_to_tmux = true
tmux_to_mesh = true
poll_interval_ms = 2000

# =============================================================================
# Memory (pi-memory)
# =============================================================================

[memory]
enabled = true
db_path = ".bosun-home/.cache/qmd/index.sqlite"
auto_update_on_open = true
default_mode = "keyword"                 # keyword | hybrid
default_limit = 5
# global_context = "Bosun sessions, docs, plans, and skills"

[memory.search_defaults]
min_score = 0.0
rerank = true

[memory.formatting]
snippet_max_lines = 12
multi_get_max_bytes = 20480
default_get_max_lines = 80

[memory.collections.sessions]
path = "workspace/users"
pattern = "**/*.md"
include_by_default = true

[memory.collections.docs]
path = "docs"
pattern = "**/*.md"
include_by_default = true

[memory.collections.skills]
path = ".pi/skills"
pattern = "**/*.md"
include_by_default = false

[memory.collections.agents]
path = ".pi/agents"
pattern = "**/*.md"
include_by_default = false

# Embedding — generates vectors for semantic/hybrid search.
# Runs as a daemon workflow (memory-embed). First run downloads ~2GB of GGUF models.
# Disable if you only need keyword search or don't have the disk/compute.
# [memory.embed]
# enabled = true                          # Set false to skip embedding entirely
# schedule = "daily:04"                   # When to re-embed (cron-style)
# startup = true                          # Also embed on daemon startup

# =============================================================================
# Web Access (pi-web-access)
# =============================================================================

[web_access]
# At least one provider key is required for web_search and fetch_content tools.
# Without a key, agents cannot search the web. After adding a key, run `just init`
# to regenerate ~/.pi/web-search.json, then restart pi to pick up the change.
#
# Gemini: Free tier available at https://aistudio.google.com/apikey
# Perplexity: ~$5/mo at https://perplexity.ai/settings/api (best search quality)
#
# perplexity_api_key = "pplx-..."
# gemini_api_key = "AIza..."
# provider = "auto"                      # auto | perplexity | gemini

# =============================================================================
# Bash Readonly (pi-bash-readonly)
# =============================================================================

[bash_readonly]
# network = false                        # Block TCP/UDP via --unshare-net (default)
# network = true                         # Allow network — if agents need git clone, curl, etc.
# writable = ["/tmp"]                    # Paths writable inside bwrap sandbox (default: none)
# enabled = true                         # Sandbox on by default (overridden by agent frontmatter)

# =============================================================================
# Image Generation (pi-img-gen)
# =============================================================================

[img_gen]
# gemini_api_key = "AIza..."             # Required — Gemini API key for image generation
# default_model = "gemini-2.5-flash-image"  # Nano Banana (default)
#   Other models: gemini-3-pro-image-preview (Pro), gemini-3.1-flash-image-preview (v2)

# =============================================================================
# Auto-Resume (pi-auto-resume)
# =============================================================================
# Automatically continue after context compaction instead of waiting for user.
# The agent reads the compaction summary and decides whether to keep going or ask.

[auto_resume]
enabled = true                            # Toggle with /autoresume at runtime
cooldown_seconds = 60                     # Min seconds between auto-resumes (0 = disabled)
# message = "Continue where you left off. If the previous task is complete or you need clarification, just ask."

# Early compaction: trigger compaction when context usage exceeds a % threshold.
# Opt-in — not set by default. Helps prevent quality degradation in long contexts.
# compact_threshold = 50          # default % for all models (uncomment to enable)

# Per-model overrides (model string → threshold %). Takes precedence over compact_threshold.
# [auto_resume.compact_thresholds]
# "gpt-5.4" = 30                  # GPT-5.4 — compact early for long orchestration
# "gpt-5.3-codex" = 40

# =============================================================================
# Pi Keybindings (overrides Pi TUI defaults)
# =============================================================================
# See: https://github.com/badlogic/pi-mono docs/keybindings.md
# Format: action = ["key1", "key2"] or action = "key"
# Fixes for conflicts with bosun's tmux keybindings:
#   Ctrl+A (tmux prefix) steals cursorLineStart → remap to Home
#   Alt+Arrow (tmux pane nav) steals word movement, tree nav, dequeue → remap

[keybindings]
cursorLineStart = ["home"]
dequeue = ["alt+u"]
cursorWordLeft = ["ctrl+left", "alt+b"]
cursorWordRight = ["ctrl+right", "alt+f"]
treeFoldOrUp = ["ctrl+left"]
treeUnfoldOrDown = ["ctrl+right"]

# =============================================================================
# Q System
# =============================================================================

[q]
data_dir = "workspace/users"
